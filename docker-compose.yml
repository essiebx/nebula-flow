# ============================================================
# docker-compose.yml — Snowflake Retail Intelligence Engine
#
# Services started:
#   - zookeeper       (Kafka dependency, port 2181)
#   - kafka           (broker, port 9092)
#   - kafka-ui        (topic browser, port 8090)
#   - postgres        (Airflow metadata DB, port 5432)
#   - airflow-init    (one-time DB init + admin user creation)
#   - airflow-webserver (port 8080)
#   - airflow-scheduler
#   - airflow-worker
#   - grafana         (dashboards, port 3000)
#
# Usage:
#   docker-compose up -d          start all services
#   docker-compose down -v        stop and remove volumes
# ============================================================

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # Pass through env vars so DAGs can read Snowflake + Kafka config
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
  volumes:
    - ./orchestration/airflow/dags:/opt/airflow/dags
    - ./orchestration/airflow/config:/opt/airflow/config
    - ./ingestion:/opt/airflow/ingestion
    - ./data_quality:/opt/airflow/data_quality
    - ./dbt_project:/opt/airflow/dbt_project
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Zookeeper (required by Kafka) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: retail_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka Broker ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: retail_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Pre-create our clickstream topic on startup
      KAFKA_CREATE_TOPICS: "retail.clickstream:3:1"

  # ── Kafka UI (topic browser at localhost:8090) ───────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: retail_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: retail-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Postgres (Airflow metadata store) ───────────────────────
  postgres:
    image: postgres:15
    container_name: retail_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # ── Airflow Init (runs once to set up DB + admin user) ──────
  airflow-init:
    <<: *airflow-common
    container_name: retail_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Retail \
          --lastname Engineer \
          --role Admin \
          --email admin@retail.local
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: retail_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: retail_airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Grafana (dashboards at localhost:3000) ───────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: retail_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./visualization/grafana/dashboards:/var/lib/grafana/dashboards
      - ./visualization/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-storage:/var/lib/grafana

volumes:
  postgres-db:
  airflow-logs:
  grafana-storage:
