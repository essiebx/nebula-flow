# ci_cd/.github/workflows/python_lint_ci.yml
name: Python Lint (flake8)

on:
  pull_request:
    branches: [main]
    paths:
      - 'ingestion/**/*.py'
      - 'orchestration/**/*.py'
      - 'scripts/**/*.py'

jobs:
  flake8:
    name: flake8 lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 ingestion/ orchestration/airflow/ scripts/ \
            --max-line-length 100 \
            --extend-ignore E203,W503 \
            --exclude __pycache__,*.pyc,.venv
        # E203: whitespace before ':' (conflicts with Black formatter)
        # W503: line break before binary operator (PEP8 opinion — ignored)
